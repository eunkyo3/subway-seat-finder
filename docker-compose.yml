services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    # 설정은 .env 하나로 들어온다. 파일이 없으면 컨테이너가 아예 안 뜨므로
    # required: false 로 두고, 인증키가 없을 때의 안내는 앱이 로그로 낸다.
    env_file:
      - path: .env
        required: false
    environment:
      # 컨테이너 안의 경로는 볼륨 마운트 지점에 맞춰 고정한다.
      # .env 에 SUBWAY_* 를 적어도 도커에서는 이 값이 이긴다(호스트 경로가 섞이면 깨진다).
      SUBWAY_DB_PATH: /app/data/subway.duckdb
      SUBWAY_RAW_DIR: /app/data/raw
      SUBWAY_SNAPSHOT_DIR: /app/data/snapshots
    volumes:
      # DB·스냅샷·원본 파일은 호스트에 남는다. 컨테이너를 지워도 배치 데이터가 살아남고,
      # 혼잡도 엑셀을 data/raw/ 에 넣으면 재빌드 없이 반영된다.
      - ./data:/app/data
    restart: unless-stopped

  # 배치 적재는 앱과 분리된 일회성 작업이다.
  #   docker compose run --rm etl
  etl:
    build: .
    profiles: ["tools"]
    env_file:
      - path: .env
        required: false
    environment:
      SUBWAY_DB_PATH: /app/data/subway.duckdb
      SUBWAY_RAW_DIR: /app/data/raw
      SUBWAY_SNAPSHOT_DIR: /app/data/snapshots
    volumes:
      - ./data:/app/data
    command: ["python", "-m", "backend.app.etl.run_all"]
