services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # DB·스냅샷·원본 파일은 호스트에 남는다. 컨테이너를 지워도 배치 데이터가 살아남고,
      # 혼잡도 엑셀을 data/raw/ 에 넣으면 재빌드 없이 반영된다.
      - ./data:/app/data
      # 인증키는 이미지에 굽지 않고 읽기 전용으로 마운트한다.
      - ./api-key.txt:/app/api-key.txt:ro
      # 실시간 지하철 인증키(별도 발급). 없으면 재생 모드로 뜨므로 필수는 아니다.
      - ./realtime-api-key.txt:/app/realtime-api-key.txt:ro
    environment:
      # 실시간 인증키는 파일 대신 환경변수로도 넣을 수 있다.
      # .env 파일에 SEOUL_REALTIME_API_KEY=... 를 두면 여기로 전달된다.
      SEOUL_REALTIME_API_KEY: ${SEOUL_REALTIME_API_KEY:-}
      SUBWAY_DB_PATH: /app/data/subway.duckdb
      SUBWAY_RAW_DIR: /app/data/raw
      SUBWAY_SNAPSHOT_DIR: /app/data/snapshots
    restart: unless-stopped

  # 배치 적재는 앱과 분리된 일회성 작업이다.
  #   docker compose run --rm etl
  etl:
    build: .
    profiles: ["tools"]
    volumes:
      - ./data:/app/data
      - ./api-key.txt:/app/api-key.txt:ro
    environment:
      SUBWAY_DB_PATH: /app/data/subway.duckdb
      SUBWAY_RAW_DIR: /app/data/raw
    command: ["python", "-m", "backend.app.etl.run_all"]
